name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  REGISTRY: git.brads.house
  IMAGE_NAME: brad/waggle

jobs:
  test:
    runs-on: docker-host
    container: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    steps:
      # The slim `docker` runner image has no Node, so actions/checkout fails.
      # Clone manually. (The image job below uses docker-host + node image,
      # where actions/checkout works fine.)
      - name: Clone repo
        run: |
          apt-get update && apt-get install -y --no-install-recommends git ca-certificates
          git clone --depth 1 "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" .
          git fetch --depth 1 origin "${GITHUB_SHA}" && git checkout "${GITHUB_SHA}"

      - name: Install deps
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check src tests

      - name: Test
        run: uv run pytest -q

  image:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: docker-host
    container:
      image: node:22-bookworm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Docker CLI
        run: apt-get update && apt-get install -y --no-install-recommends docker.io

      - name: Login to Forgejo Registry
        run: |
          echo "${{ secrets.REGISTRY_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ secrets.REGISTRY_USER }} --password-stdin

      - name: Build and push
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
